<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apocalypse Companion Flasher</title>
    <!-- Import ESP Web Tools -->
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131c2e;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .brand-header {
            background-color: #ffffff;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-logo {
            max-width: 80%;
            height: auto;
            display: block;
        }

        .card-content {
            padding: 30px 24px;
            text-align: center;
        }

        .meta-tags {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(30, 41, 59, 0.7);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #94a3b8;
            font-family: monospace;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-style: italic;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #334155, transparent);
            margin: 16px 0;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 24px 0;
        }

        .steps {
            text-align: left;
            background: rgba(11, 15, 25, 0.6);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 28px;
            border: 1px solid #1e293b;
        }

        .step-item {
            display: flex;
            align-items: flex-start;
            font-size: 0.85rem;
            color: #cbd5e1;
            margin: 10px 0;
            line-height: 1.4;
        }

        .step-number {
            background: var(--accent-color);
            color: white;
            border-radius: 4px;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Styling the custom ESP web tools button */
        esp-web-install-button {
            --esp-tools-button-color: var(--text-main);
            --esp-tools-button-bg: var(--accent-color);
            --esp-tools-button-border-radius: 8px;
            display: block;
            width: 100%;
        }

        esp-web-install-button button {
            width: 100%;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-main);
            background: linear-gradient(180deg, #0284c7 0%, #0369a1 100%);
            border: 1px solid #075985;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
        }

        esp-web-install-button button:hover {
            background: linear-gradient(180deg, #0369a1 0%, #075985 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(2, 132, 199, 0.4);
        }
        
        esp-web-install-button button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="card">
            <!-- White branding enclosure for the image asset -->
            <div class="brand-header">
                <img src="logo1.jpg" alt="Dr. Electronics Logo" class="brand-logo">
            </div>
            
            <div class="card-content">
                <div class="meta-tags">
                    <span class="tag">Firmware: v1.0.1</span>
                    <span class="tag">Status: Ready</span>
                </div>

                <h1>Apocalypse Companion</h1>
                <p>Flash your device with the resilient APOCALYPSE COMPANION firmware configuration utility.</p>
                
                <div class="divider"></div>

                <div class="steps">
                    <div class="step-item">
                        <span class="step-number">1</span> 
                        <span>Connect your device via USB interface.</span>
                    </div>
                    <div class="step-item">
                        <span class="step-number">2</span> 
                        <span>Click the Connect & Flash button below.</span>
                    </div>
                    <div class="step-item">
                        <span class="step-number">3</span> 
                        <span>Grant browser serial permission and choose the matching COM port.</span>
                    </div>
                </div>
                
                <esp-web-install-button manifest="./manifest.json">
                    <button slot="activate">Connect & Flash</button>
                </esp-web-install-button>
            </div>
        </div>
    </div>

</body>
</html>
