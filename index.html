<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apocalypse Companion Flasher</title>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131c2e;
            --accent-color: #0284c7;
            --accent-hover: #0369a1;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --yt-color: #ef4444;
            --ig-color: #e1306c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .brand-header {
            background-color: #ffffff;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-logo {
            max-width: 80%;
            height: auto;
            display: block;
        }

        .card-content {
            padding: 30px 24px;
            text-align: center;
        }

        .meta-tags {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(30, 41, 59, 0.7);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #94a3b8;
            font-family: monospace;
            border: 1px solid #334155;
        }

        .tag.status-text {
            color: #4ade80;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-style: italic;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 20px 0;
        }

        /* Form / Selector Controls */
        .control-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .styled-select {
            width: 100%;
            padding: 12px;
            background-color: #0b0f19;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .styled-select:focus {
            border-color: var(--accent-color);
        }

        /* Action Buttons Grid */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background-color: #334155;
            border-color: #475569;
        }

        /* Social Section */
        .social-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 24px 0 16px 0;
        }

        .social-divider::before, .social-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #1e293b;
        }

        .social-divider:not(:empty)::before { margin-right: .5em; }
        .social-divider:not(:empty)::after { margin-left: .5em; }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-social:hover { opacity: 0.9; }
        .btn-youtube { background-color: var(--yt-color); }
        .btn-instagram { background-color: var(--ig-color); }

        /* Flasher Button Custom Style Override */
        esp-web-install-button {
            --esp-tools-button-color: var(--text-main);
            --esp-tools-button-bg: var(--accent-color);
            --esp-tools-button-border-radius: 8px;
            display: block;
            width: 100%;
            margin-top: 10px;
        }

        esp-web-install-button button {
            width: 100%;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-main);
            background: linear-gradient(180deg, #0284c7 0%, #0369a1 100%);
            border: 1px solid #075985;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
        }

        esp-web-install-button button:hover {
            background: linear-gradient(180deg, #0369a1 0%, #075985 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(2, 132, 199, 0.4);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="card">
            <div class="brand-header">
                <img src="logo1.jpg" alt="Dr. Electronics Logo" class="brand-logo">
            </div>
            
            <div class="card-content">
                <div class="meta-tags">
                    <span class="tag" id="version-tag">Latest: v1.0.0</span>
                    <span class="tag status-text">Status: Ready</span>
                </div>

                <h1>Apocalypse Companion</h1>
                <p> Made With Love </p>
                
                <div class="control-group">
                    <label for="version-select">Select Firmware Version</label>
                    <select id="version-select" class="styled-select" onchange="updateVersion()">
                        <option value="1.0.0" data-manifest="./manifest_v1.0.0.json" data-bin="Apocalypse_v1.0.0.bin">v1.0.0 (Stable Release)</option>
                        <option value="1.1.0" data-manifest="./manifest_v1.1.0.json" data-bin="Apocalypse_v1.1.0.bin">v1.1.0 (Stable release)</option>
                        <option value="1.2.0" data-manifest="./manifest_v1.2.0.json" data-bin="Apocalypse_v1.2.0.bin">v1.2.0 (Stable release)</option>
                        <option value="1.3.0" data-manifest="./manifest_v1.3.0.json" data-bin="Apocalypse_v1.3.0.bin">v1.3.0 (Stable release)</option>
                        <option value="1.4.0" data-manifest="./manifest_v1.4.0.json" data-bin="Apocalypse_v1.4.0.bin">v1.4.0 (Stable release)</option>
                        <option value="1.5.0" data-manifest="./manifest_v1.5.0.json" data-bin="Apocalypse_v1.5.0.bin">v1.5.0 (Beta Update)</option>
                    </select>
                </div>

                <div class="action-grid">
                    <a id="download-btn" href="Apocalypse_v1.0.0.bin" download class="btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download (.BIN) File
                    </a>
                </div>
                
                <esp-web-install-button id="flasher-btn" manifest="./manifest_v1.0.0.json">
                    <button slot="activate">Connect & Flash</button>
                </esp-web-install-button>

                <div class="social-divider">Community & Support</div>
                <div class="social-grid">
                    <a href="https://www.youtube.com/@drelectronics13" target="_blank" class="btn-social btn-youtube">
                        YouTube
                    </a>
                    <a href="https://www.instagram.com/dr.ausaf" target="_blank" class="btn-social btn-instagram">
                        Instagram
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateVersion() {
            const selector = document.getElementById('version-select');
            const selectedOption = selector.options[selector.selectedIndex];
            
            const manifestPath = selectedOption.getAttribute('data-manifest');
            const binPath = selectedOption.getAttribute('data-bin');
            const versionText = selectedOption.value;

            // 1. Update the display tag badge
            document.getElementById('version-tag').innerText = "Firmware: v" + versionText;
            
            // 2. Point the Web Flasher component to the correct version manifest
            document.getElementById('flasher-btn').setAttribute('manifest', manifestPath);
            
            // 3. Point the download button to the correct binary file
            document.getElementById('download-btn').setAttribute('href', binPath);
        }
    </script>
</body>
</html>
